<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>каталог хобби</title>
    <link rel="icon" href="../images/icon.ico">
</head>
<body>
    <div class="header">
      <div class="header-wrapper container">
        <div class="header-logo"><a href="index.html"><img src='../images/header-logo.svg'></a></div>
        <div class="header-menu">
          <ul>
              <li><a href="hobbies.html">каталог хобби</a></li>
              <li><a href="articles.html">статьи</a></li>
              <li><a href="tests.html">тесты</a></li>
              <li><a href="about.html">о медиа</a></li>
          </ul>
        </div>
        <div class="burger" id="burger">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>

        <div class="hobby-header container">
        <h1 class="h1">все хобби</h1>
        <div class="search">
            <input type="text"  placeholder="Топ-10 занятий вьетнамцев">
            <button class="search-icon"><img src="../images/search_icon.svg"></button>
        </div>
    </div>

    <div class="hobby-filters container">
        <div class="hobby-filters-wrapper">
            <p class="p2">время:</p>
            <div class="hobby-filters-items">
                <label class="hobby-filter-item">
                    <input type="checkbox" value="30-60">
                    <span class="checkmark"></span>
                    <p class="filter-p">30–60 минут</p>
                </label>
                <label class="hobby-filter-item">
                    <input type="checkbox" value="1-2">
                    <span class="checkmark"></span>
                    <p class="filter-p">1–2 ч</p>
                </label>
                <label class="hobby-filter-item">
                    <input type="checkbox" value="3-4">
                    <span class="checkmark"></span>
                    <p class="filter-p">3–4 ч</p>
                </label>
            </div>
        </div>

        <div class="hobby-filters-wrapper">
            <p class="p2">стоимость:</p>
            <div class="hobby-filters-items">
                <label class="hobby-filter-item">
                    <input type="checkbox" value="free">
                    <span class="checkmark"></span>
                    <p class="filter-p">бесплатно</p>
                </label>
                <label class="hobby-filter-item">
                    <input type="checkbox" value="1000">
                    <span class="checkmark"></span>
                    <p class="filter-p">до 1 000 ₽</p>
                </label>
                <label class="hobby-filter-item">
                    <input type="checkbox" value="1000plus">
                    <span class="checkmark"></span>
                    <p class="filter-p">от 1 000 ₽</p>
                </label>
            </div>
        </div>

        <div class="hobby-filters-wrapper">
            <p class="p2">сложность:</p>
            <div class="hobby-filters-items">
                <label class="hobby-filter-item">
                    <input type="checkbox" value="easy">
                    <span class="checkmark"></span>
                    <p class="filter-p">легко</p>
                </label>
                <label class="hobby-filter-item">
                    <input type="checkbox" value="medium">
                    <span class="checkmark"></span>
                    <p class="filter-p">средняя</p>
                </label>
                <label class="hobby-filter-item">
                    <input type="checkbox" value="hard">
                    <span class="checkmark"></span>
                    <p class="filter-p">сложно</p>
                </label>
            </div>
        </div>
    </div>

    <div class="M_Search">
        <input type="text" name="request" class="A_SearchInput" value="" placeholder="Введите запрос" />
        <span class="A_SearchDelete disabled"></span>
        <button class="A_SearchButton disabled" type="button">Поиск</button>
    </div>
    <div class="S_Content"></div> 

</body>
