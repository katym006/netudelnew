<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Тест</title>
</head>
<body>
<div class="quiz">
  <div class="header no-bg">
      <div class="header-wrapper container">
        <div class="header-logo"><a href="/index.html"><img src='../../images/header-logo.svg'></a></div>
        <div class="header-menu">
          <ul>
              <li><a href="/hobbies.html">каталог хобби</a></li>
              <li><a href="#articles">статьи</a></li>
              <li><a class="menu-active" href="/tests.html">тесты</a></li>
              <li><a href="#about">о медиа</a></li>
          </ul>
        </div>
      </div>
    </div>
  <div class="quiz-wrap container">

    <div id="questionNumber" class="p2">Вопрос 1 из 6</div>
    
    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <h2 id="questionText" class="h2"></h2>

    <div id="answers" class="answers"></div>

    <div class="quiz-buttons">
      <button class="secondary medium" id="prevBtn"><a href=#>назад</a></button>
      <button class="primary medium" id="nextBtn"><a href=#>далее</a></button>
    </div>

  </div>
</div>
</body>
<script>
document.addEventListener("DOMContentLoaded", function () {

const questions = [
  {
    question: "Ваша реакция, если\nчто-то не получается сразу?",
    answers: [
      "Спокойно отношусь, рано или поздно получится",
      "Если не получается, значит это не моё",
      "Хочу сразу всё бросить, но держу себя в руках",
      "Смотрю на проблему как на вызов и пробую другой подход"
    ]
  },
  {
    question: "Рассматривали ли вы сделать\nиз хобби профессию?",
    answers: [
      "Нет, хобби должно быть для души",
      "Возможно, но хочу попробовать постепенно",
      "Не уверена/не уверен в своих навыках",
      "Да, идеально мне подходит"
    ]
  },
  {
    question: "Во время занятия хобби чем\nвы занимаетесь параллельно?",
    answers: [
      "Иногда отвлекаюсь, но возвращаюсь к процессу",
      "Могу заниматься параллельно тысячью вещами",
      "Мне тяжело сосредоточиться",
      "Ничем, полностью погружён в занятие"
    ]
  },
  {
    question: "Есть ли у вас\nединомышленники?",
    answers: [
      "Нет, и не искал(а)",
      "Пока нет, но ищу людей с похожими интересами",
      "Общаюсь только с несколькими близкими друзьями",
      "Да, благодаря хобби появилось много знакомых"
    ]
  },
  {
    question: "Какое у вас\nлюбимое хобби?",
    answers: [
      "Созерцательное, где можно рассуждать о высшем, ходить на выставки и высказывать свое мнение",
      "Активные занятия, после которых я чувствую себя как выжатый лимон",
      "Мне нравится занимать мозг решением задач, шахматами, развивать интеллект и прокачивать логику.",
      "Что-то творческое, где я могу проявить креатив и создавать что-то своими руками"
    ]
  },
  {
    question: "Долго ли вы искали\nсвоё хобби?",
    answers: [
      "Да, долго, пробовала много разного",
      "Все еще ищу",
      "Нет цели найти свое хобби, пробую все помаленьку",
      "Нет, не долго, сразу знал(а), что мне нравится"
    ]
  },
];

let currentQuestion = 0;
let answers = [];

const questionText = document.getElementById("questionText");
const answersContainer = document.getElementById("answers");
const nextBtn = document.getElementById("nextBtn");
const prevBtn = document.getElementById("prevBtn");
const progressBar = document.getElementById("progressBar");
const questionNumber = document.getElementById("questionNumber");

function showQuestion() {
  const q = questions[currentQuestion];

  questionText.textContent = q.question;
  questionNumber.textContent = `Вопрос ${currentQuestion + 1} из ${questions.length}`;

  answersContainer.innerHTML = "";

  q.answers.forEach((answer, index) => {
    const btn = document.createElement("div");
    btn.classList.add("answer-btn");
    btn.textContent = answer;

    // если уже был выбран ответ — подсветить
    if (answers[currentQuestion] === index) {
      btn.classList.add("selected");
    }

    btn.onclick = () => {
      answers[currentQuestion] = index;

      document.querySelectorAll(".answer-btn").forEach(b => {
        b.classList.remove("selected");
      });

      btn.classList.add("selected");
    };

    answersContainer.appendChild(btn);
  });

  updateProgress();
  updateButtons();
}

function updateProgress() {
  const progress = (currentQuestion / questions.length) * 100;
  progressBar.style.width = progress + "%";
}

function updateButtons() {
  prevBtn.style.display = currentQuestion === 0 ? "none" : "inline-block";
}

nextBtn.onclick = () => {
  if (answers[currentQuestion] === undefined) {
    alert("Выберите ответ");
    return;
  }

  currentQuestion++;

  if (currentQuestion < questions.length) {
    showQuestion();
  } else {
    window.location.href = "test_result.html";;
  }
};

prevBtn.onclick = () => {
  if (currentQuestion > 0) {
    currentQuestion--;
    showQuestion();
  }
};

showQuestion();

});

</script>
</html>
